name: renuncias e desoneracoes
owner_org: 'secretaria-de-estado-de-fazenda'
profile: data-package
resources:
  - dialect:
      delimiter: ;
      skipInitialSpace: true
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: previsao_renuncias_novas
    path: data/previsao_renuncias_novas.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: ano
          type: string
        - name: regionalizacao
          type: string
        - name: tributo
          type: string
        - name: modalidade
          type: texto
        - name: setor_programa_beneficiario
          type: number
        - name: valor
          type: number
    scheme: file
    title: Previsão Renúncias Novas
  - dialect:
      delimiter: ;
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: previsao_renuncias_pre_existentes
    path: data/previsao_renuncias_pre_existentes.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: ano
          type: string
        - name: tipo
          type: texto
        - name: regionalizacao
          type: string
        - name: icms_isencao_base_calculo
          type: string
        - name: icms_reducao_aliquota
          type: string
        - name: icms_credito_presumido
          type: string
        - name: icms_incentivo_cultura_esporte
          type: string
        - name: icms_suframa
          type: string
        - name: icms_anistia
          type: string
        - name: ipva_isencao
          type: string
        - name: ipva_reducao_aliquota
          type: string
        - name: anistia_itcd
          type: string
        - name: anistia_taxa
          type: string
    scheme: file
    title: Previsão Renúncias Pré Existentes
  - dialect:
      delimiter: ;
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: renuncias_concedidas
    path: data/renuncias_concedidas.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: ano
          type: string
        - name: tipo
          type: texto
        - name: tributo
          type: string
        - name: modalidade
          type: texto
        - name: norma_autorizada
          type: string
        - name: montante_perdas
          type: string
    scheme: file
    title: Renúncias Concedidas
title: Renúncias e Desonerações
